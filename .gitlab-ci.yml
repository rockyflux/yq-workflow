image: node:20

stages:
  - deploy

variables:
  PNPM_HOME: "$CI_PROJECT_DIR/.pnpm"

cache:
  key:
    files:
      - pnpm-lock.yaml
  paths:
    - .pnpm-store/

pages:
  stage: deploy
  before_script:
    - corepack enable
    - pnpm config set store-dir .pnpm-store
  script:
    - pnpm install --frozen-lockfile
    - pnpm docs:build
    - rm -rf public
    - mkdir -p public
    - cp -r docs/.vitepress/dist/. public/
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
